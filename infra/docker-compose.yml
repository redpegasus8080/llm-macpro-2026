services:
  mariadb:
    image: mariadb:11
    container_name: llm-macpro-mariadb
    platform: linux/arm64
    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: llm_macpro
      MARIADB_USER: llm
      MARIADB_PASSWORD: llmpw
      TZ: Asia/Seoul

    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mariadb_data: